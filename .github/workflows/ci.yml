name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: one isolated job per suite (separate venv = no cross-service dep
  #    conflicts, parallel, clear failure attribution). A single `python -m pytest`
  #    also works locally thanks to the root conftest hook. ──────────────────────
  backend:
    name: backend · ${{ matrix.suite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { suite: shared,      path: shared/tests,               reqs: "" }
          - { suite: ai-filter,   path: services/ai-filter/tests,   reqs: services/ai-filter/requirements.txt }
          - { suite: backtest,    path: services/backtest/tests,    reqs: services/backtest/requirements.txt }
          - { suite: gateway,     path: services/gateway/tests,     reqs: services/gateway/requirements.txt }
          - { suite: journal,     path: services/journal/tests,     reqs: services/journal/requirements.txt }
          - { suite: market-data, path: services/market-data/tests, reqs: services/market-data/requirements.txt }
          - { suite: risk,        path: services/risk/tests,        reqs: services/risk/requirements.txt }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./shared
          if [ -n "${{ matrix.reqs }}" ]; then pip install -r "${{ matrix.reqs }}"; fi
          pip install pytest pytest-asyncio
      - name: Run ${{ matrix.suite }} tests
        run: python -m pytest "${{ matrix.path }}" -q

  # ── Frontend: typecheck + production build (also compiles the Edge middleware). ─
  frontend:
    name: frontend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dashboard-next
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: services/dashboard-next/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  # ── Lint: advisory for now (doesn't gate). Tighten once the tree is clean. ─────
  lint:
    name: lint · ruff (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check services shared
