[pytest]
# Run all service tests from the repo root:
#   python -m pytest
#
# Run a single service:
#   python -m pytest services/backtest/tests/
#   python -m pytest services/ai-filter/tests/
#   python -m pytest services/journal/tests/

testpaths =
    shared/tests
    services/ai-filter/tests
    services/backtest/tests
    services/journal/tests
    services/risk/tests

# importlib mode prevents conftest.py name collision across service dirs
addopts = --import-mode=importlib
