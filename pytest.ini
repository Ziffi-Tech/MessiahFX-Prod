[pytest]
# Run the FULL suite from the repo root — works in one process now: the root
# conftest's pytest_collectstart hook resolves the shared `app` package name
# across services.
#   python -m pytest
#
# Run a single service:
#   python -m pytest services/backtest/tests/
#
# Run every suite in an isolated process (CI parity):
#   bash scripts/run_tests.sh

testpaths =
    shared/tests
    services/ai-filter/tests
    services/backtest/tests
    services/gateway/tests
    services/journal/tests
    services/market-data/tests
    services/risk/tests

# importlib mode prevents conftest.py name collision across service dirs
addopts = --import-mode=importlib
