# ─────────────────────────────────────────────────────────────────────────────
# MeznaQuantFX AI — Redis Configuration
#
# CRITICAL FOR PRODUCTION SAFETY:
# AOF persistence is MANDATORY. Risk state (daily drawdown, consecutive losses,
# kill switch flag) is stored in Redis. Without AOF, a Redis restart resets
# your risk controls to zero — a live trading catastrophe.
# ─────────────────────────────────────────────────────────────────────────────

# ── Network ───────────────────────────────────────────────────────────────────
bind 0.0.0.0
protected-mode no
port 6379
tcp-keepalive 300
timeout 0

# ── Persistence — AOF (Append-Only File) ──────────────────────────────────────
# MANDATORY: Do not disable. Survive Redis restarts with full state intact.
appendonly yes
appendfilename "appendonly.aof"

# everysec: flush to disk every second. Best balance of performance and safety.
# For live trading, consider changing to 'always' (slower but zero data loss).
appendfsync everysec

# Rewrite AOF when it doubles in size (reduces file bloat)
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Disable RDB snapshots — use AOF only to avoid confusion about persistence state
save ""

# ── Memory ────────────────────────────────────────────────────────────────────
# Limit Redis memory usage. Adjust based on available RAM.
# This leaves headroom for PostgreSQL, Python services, and OS.
# For 16GB RAM host: 512mb is conservative and appropriate.
maxmemory 512mb

# When maxmemory is reached, evict least-recently-used keys.
# Risk state keys are accessed frequently and will not be evicted.
maxmemory-policy allkeys-lru

# ── Streams (Signal Queues) ───────────────────────────────────────────────────
# Streams used for opportunity signals and approved orders.
# These are consumed quickly, so cap stream length to prevent memory bloat.
# Adjust per observed throughput.
# (Applied in application code via MAXLEN ~)

# ── Lazy Freeing ─────────────────────────────────────────────────────────────
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Slow Log (for debugging) ──────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Clients ───────────────────────────────────────────────────────────────────
maxclients 100

# ── Disable dangerous commands in production ──────────────────────────────────
# These commands are disabled to prevent accidental wipe of risk state or keys.
# FLUSHALL/FLUSHDB would erase the kill switch and daily-drawdown counters.
# To re-enable temporarily for maintenance, restart Redis without this config.
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
# CONFIG is renamed (not disabled) so services can still read it via the
# renamed form if needed during debugging. Change the alias in production.
rename-command CONFIG "MEZNA_CONFIG_9f3a"
