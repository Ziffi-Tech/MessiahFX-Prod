# MeznaQuantFX — Prometheus alert rules.
# Loaded via rule_files in prometheus.yml. Without an alertmanager these fire in
# the Prometheus UI; the services ALSO push feed-down / drawdown notifications to
# the notifications queue (Telegram/Discord), so operators are alerted either way.

groups:
  - name: mezna_service_health
    rules:
      - alert: ServiceDown
        expr: up{job=~"gateway|market-data|strategy|risk|executor|journal|ai-filter|backtest|notifications"} == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for 1m."

      - alert: HighErrorRate
        expr: sum by (job) (rate(http_requests_total{status=~"5.."}[5m])) > 1
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "High 5xx rate on {{ $labels.job }}"
          description: "{{ $labels.job }} is serving >1 5xx/s over 5m."

      - alert: HighRequestLatencyP95
        expr: histogram_quantile(0.95, sum by (job, le) (rate(http_request_duration_seconds_bucket[5m]))) > 1
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "p95 latency high on {{ $labels.job }}"
          description: "p95 request latency > 1s over 5m on {{ $labels.job }}."

  - name: mezna_trading
    rules:
      - alert: FeedDown
        expr: mezna_feed_up == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "Market-data feed down: {{ $labels.venue }}"
          description: "No fresh heartbeat from the {{ $labels.venue }} feed for 1m — strategies are trading on stale or absent prices."

      - alert: DrawdownNearLimit
        expr: mezna_daily_drawdown_pct >= 2.4
        for: 1m
        labels: { severity: warning }
        annotations:
          summary: "Daily drawdown near the limit"
          description: "Daily drawdown {{ $value }}% has reached the warning band (80% of the 3% cap)."

      - alert: TradingHalted
        expr: mezna_trading_halted == 1
        for: 0m
        labels: { severity: warning }
        annotations:
          summary: "Trading halted (kill switch active)"
          description: "The kill switch is active — no orders will execute until reset."

      - alert: ConsecutiveLossesHigh
        expr: mezna_consecutive_losses >= 4
        for: 0m
        labels: { severity: warning }
        annotations:
          summary: "Consecutive losses elevated"
          description: "{{ $value }} consecutive losses — approaching the rotation/halt threshold."
