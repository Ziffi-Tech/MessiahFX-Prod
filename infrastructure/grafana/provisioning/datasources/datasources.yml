
# ─────────────────────────────────────────────────────────────────────────────
# Grafana Auto-Provisioned Datasources
# Both datasources are wired automatically on first start — no manual setup.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

datasources:

  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod:   "POST"

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        # Link Loki log lines to Prometheus traces via service label
        - name:        service
          matcherType: label
          matcherValue: service
          url:         ""
